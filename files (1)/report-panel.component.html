<app-side-panel (closed)="closed.emit()">

  <app-panel-header [data]="headerData()" (closed)="closed.emit()">
    <img panelImage class="panel-image"
      [appReportImage]="report()"
      [alt]="report().name + ' image'"
      width="180" height="120">
  </app-panel-header>

  <mat-tab-group class="tabs" animationDuration="200ms">
    <mat-tab>
      <ng-template mat-tab-label>Overview</ng-template>
      <ng-template matTabContent>
        <app-overview
          [data]="overviewData()"
          [saving]="store.isLoading()"
          (sensitivityChanged)="onCertificationChanged($event)">
        </app-overview>
      </ng-template>
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>Usage Analytics</ng-template>
      <ng-template matTabContent>
        <app-usage-analytics [report]="report()"></app-usage-analytics>
      </ng-template>
    </mat-tab>
  </mat-tab-group>

</app-side-panel>
