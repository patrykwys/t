<div class="backdrop" (click)="closed.emit()"></div>

<aside class="panel" data-cy="side-panel">
  <header class="panel-header">
    <div class="panel-image-wrapper">
      <img class="panel-image"
        [ngSrc]="data().certifiedImageSrc"
        [alt]="data().name + ' image'"
        width="180" height="120" priority>

      <img class="source-icon"
        [ngSrc]="data().sourceIconSrc"
        [alt]="data().sourceLabel + ' icon'"
        width="30" height="30" priority>

      <app-datasource-badge class="panel-image-banner badge-image-banner"
        [variant]="data().isCertified ? 'certified' : 'uncertified'"
        mode="overlay">
      </app-datasource-badge>
    </div>

    <div class="panel-title-area">
      <h2 class="panel-title">{{ data().name }}</h2>

      <div class="panel-source-pill">
        <mat-chip-row class="datasource-pill">
          <span class="datasource-pill-content">
            <span>{{ data().sourceLabel }}</span>
          </span>
        </mat-chip-row>
      </div>

      <div class="panel-owner-row">
        <span class="panel-avatar">{{ data().owner }}</span>
        <span class="panel-owner-name">{{ data().owner }}</span>
      </div>
    </div>

    <button mat-icon-button class="panel-close" (click)="closed.emit()">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <ng-content></ng-content>
</aside>
